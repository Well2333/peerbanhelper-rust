name: Release

# 推送 v* 标签时自动构建各平台可执行并上传到对应 Release；也可手动触发（仅产出 artifact）。
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: tar.gz
          - os: macos-13
            target: x86_64-apple-darwin
            archive: tar.gz
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release -p pbh-server --target ${{ matrix.target }}

      - name: Package (unix)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          ver="${GITHUB_REF_NAME#v}"
          name="pbh-rust-${ver}-${{ matrix.target }}"
          mkdir -p "dist/$name"
          cp "target/${{ matrix.target }}/release/pbh" "dist/$name/pbh-rust"
          cp README.md "dist/$name/" 2>/dev/null || true
          tar -C dist -czf "dist/$name.tar.gz" "$name"
          echo "ASSET=dist/$name.tar.gz" >> "$GITHUB_ENV"
          echo "ASSET_NAME=$name" >> "$GITHUB_ENV"
          # 自更新资产：gzip 压缩的裸二进制（命名固定为 pbh-rust-<target>.gz，供 /api/update/apply 下载）
          gzip -c "target/${{ matrix.target }}/release/pbh" > "dist/pbh-rust-${{ matrix.target }}.gz"
          echo "ASSET_SELF=dist/pbh-rust-${{ matrix.target }}.gz" >> "$GITHUB_ENV"

      - name: Package (windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $ver = "${env:GITHUB_REF_NAME}" -replace '^v',''
          $name = "pbh-rust-$ver-${{ matrix.target }}"
          New-Item -ItemType Directory -Force "dist/$name" | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/pbh.exe" "dist/$name/pbh-rust.exe"
          Copy-Item README.md "dist/$name/" -ErrorAction SilentlyContinue
          Compress-Archive -Path "dist/$name/*" -DestinationPath "dist/$name.zip"
          "ASSET=dist/$name.zip" | Out-File -FilePath $env:GITHUB_ENV -Append
          "ASSET_NAME=$name" | Out-File -FilePath $env:GITHUB_ENV -Append
          # 自更新资产：gzip 压缩的裸 exe（命名固定为 pbh-rust-<target>.gz）
          $src = "target/${{ matrix.target }}/release/pbh.exe"
          $self = "dist/pbh-rust-${{ matrix.target }}.gz"
          $in = [System.IO.File]::OpenRead($src)
          $out = [System.IO.File]::Create($self)
          $gz = New-Object System.IO.Compression.GzipStream($out, [System.IO.Compression.CompressionMode]::Compress)
          $in.CopyTo($gz); $gz.Close(); $out.Close(); $in.Close()
          "ASSET_SELF=$self" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ASSET_NAME }}
          path: ${{ env.ASSET }}

      - name: Attach to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.ASSET }}
            ${{ env.ASSET_SELF }}
          fail_on_unmatched_files: true
